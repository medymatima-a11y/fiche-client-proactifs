<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Présentation patrimoniale | Proactifs Conseils</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,600&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --ivory:#FAFAF7;--sand:#F3F1EB;--forest:#132D1E;--forest-mid:#1C3D28;
  --ink:#111827;--ink-soft:#374151;--gold:#C4973A;--gold-light:#E8C97A;
  --gold-pale:#FBF4E3;--teal:#1E7A6E;--teal-pale:#E6F4F2;--slate:#6B7280;
  --border:#E5E2DA;--white:#FFFFFF;--red:#B4413C;--red-pale:#FBEDEC;
  --shadow:0 10px 34px rgba(17,24,39,.10),0 3px 10px rgba(17,24,39,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#0c1813;color:var(--ink);overflow:hidden}
.deck{height:100vh;width:100vw;position:relative}
.slide{position:absolute;inset:0;opacity:0;visibility:hidden;transition:opacity .4s ease;
  display:flex;flex-direction:column;justify-content:center;padding:6vh 7vw;background:var(--ivory)}
.slide.active{opacity:1;visibility:visible}
.slide.dark{background:linear-gradient(150deg,var(--forest),var(--forest-mid));color:var(--ivory)}
h1,h2,h3{font-family:'Fraunces',serif;font-weight:600;line-height:1.12;color:var(--forest)}
.dark h1,.dark h2,.dark h3{color:var(--ivory)}
em{font-style:italic;color:var(--gold)}.dark em{color:var(--gold-light)}
.label{font-family:'DM Mono',monospace;font-size:.8rem;letter-spacing:.22em;text-transform:uppercase;color:var(--teal);font-weight:500;margin-bottom:14px}
.label.gold{color:var(--gold)}.dark .label{color:var(--gold-light)}
h2{font-size:clamp(1.8rem,3.6vw,3rem);margin-bottom:26px}
p{color:var(--ink-soft);line-height:1.55}.dark p{color:#DDE7E0}
.muted{color:var(--slate)}.small{font-size:.85rem}
.row{display:flex;gap:26px}.col{flex:1}
.card{background:var(--white);border:1px solid var(--border);border-radius:16px;padding:26px 28px;box-shadow:var(--shadow)}
.card .ctitle{font-family:'DM Mono',monospace;font-size:.78rem;letter-spacing:.14em;text-transform:uppercase;color:var(--teal);font-weight:500;margin-bottom:16px}
.card.gold .ctitle{color:var(--gold)}
ul{list-style:none}
li{position:relative;padding-left:22px;margin-bottom:13px;color:var(--ink-soft);line-height:1.5}
li::before{content:'';position:absolute;left:2px;top:9px;width:7px;height:7px;border-radius:2px;background:var(--gold)}
.dark li{color:#DDE7E0}
.brand{font-family:'DM Mono',monospace;letter-spacing:.22em;text-transform:uppercase;color:var(--gold-light);font-size:.92rem;margin-bottom:30px}
.cover h1{color:var(--ivory);font-size:clamp(2.6rem,6vw,5rem);line-height:1.05;margin-bottom:18px}
.cover .sub{color:#CFE0D5;font-size:clamp(1rem,1.7vw,1.4rem)}
.metarow{display:flex;gap:12px 5vw;margin-top:5vh;padding-top:22px;border-top:1px solid rgba(232,201,122,.25);flex-wrap:wrap}
.cover-ctx{display:grid;grid-template-columns:1fr 1fr;gap:18px 5vw;margin-top:3vh}
.cover-ctx p{color:#DDE7E0;font-size:.95rem;line-height:1.58;margin-top:6px}
.cover-ctx .label{margin-bottom:6px}
.metarow span{display:block;font-family:'DM Mono',monospace;font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--gold-light);margin-bottom:6px}
.metarow strong{font-weight:500;color:var(--ivory);font-size:1.05rem}
.kpis{display:grid;gap:18px;margin-bottom:26px}
.kpi{background:var(--white);border:1px solid var(--border);border-radius:16px;padding:22px;text-align:center;box-shadow:var(--shadow)}
.kpi.hl{background:var(--gold-pale)}
.kpi .v{font-family:'Fraunces',serif;font-size:clamp(1.4rem,2.6vw,2rem);font-weight:600;color:var(--forest)}
.kpi .k{font-size:.82rem;color:var(--slate);margin-top:6px}
.obj{display:flex;gap:22px;align-items:center;background:var(--white);border:1px solid var(--border);border-radius:16px;padding:22px 28px;margin-bottom:16px;box-shadow:var(--shadow)}
.obj .n{flex:none;width:52px;height:52px;border-radius:50%;background:var(--forest);color:var(--gold-light);display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-size:1.5rem;font-weight:600}
.obj h3{font-size:1.3rem;margin-bottom:4px}
.lev .n{width:46px;height:46px;border-radius:50%;background:var(--gold-pale);border:2px solid var(--gold);color:var(--gold);display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-weight:600;font-size:1.25rem;margin-bottom:18px}
.lev h3{font-size:1.25rem;margin-bottom:12px}
.alert{border-radius:16px;padding:24px 28px;background:var(--red-pale);border-left:5px solid var(--red)}
.alert h3{color:var(--red);font-size:1.35rem;margin-bottom:12px}
.band{border-radius:16px;padding:26px 30px;background:var(--forest);margin-top:8px}
.band h3{color:var(--gold-light);font-size:1.45rem;margin-bottom:12px}
.stat-box{background:var(--gold-pale);border-radius:14px;padding:24px;margin-top:18px}
.stat-box .big{font-family:'Fraunces',serif;font-size:clamp(2.2rem,4vw,3rem);font-weight:600;color:var(--gold);line-height:1}
.stat-box p{margin-top:12px}
table{width:100%;border-collapse:collapse;font-size:1rem;background:var(--white);border-radius:12px;overflow:hidden;box-shadow:var(--shadow)}
th,td{text-align:left;padding:13px 18px;border-bottom:1px solid var(--border)}
th{background:var(--forest);color:var(--gold-light);font-weight:600;font-size:.92rem}
td.num,th.num{text-align:right}
tr:last-child td{border-bottom:none}
tr.hl td{font-weight:700;color:var(--forest)}
.eff{background:var(--white);border:1px solid var(--border);border-left:5px solid var(--gold);border-radius:12px;padding:15px 20px;margin-bottom:13px;box-shadow:var(--shadow)}
.eff h3{font-size:1.1rem;margin-bottom:5px}.eff p{font-size:.93rem}
.steps .step{display:flex;gap:24px;padding:12px 0;border-bottom:1px solid #36503F;align-items:baseline}
.steps .when{flex:none;width:150px;font-family:'DM Mono',monospace;font-size:.85rem;letter-spacing:.06em;text-transform:uppercase;color:var(--gold-light)}
.steps p{color:#E6EDE8}
.piecebox{border:1px solid var(--gold);border-radius:16px;padding:24px;background:var(--forest-mid)}
.piecebox .ctitle{font-family:'DM Mono',monospace;font-size:.78rem;letter-spacing:.14em;text-transform:uppercase;color:var(--gold-light);margin-bottom:16px}
.piecebox li{color:#E6EDE8}.piecebox li::before{background:var(--gold-light)}
.foot{position:absolute;left:7vw;bottom:3.5vh;font-size:.78rem;color:var(--slate);font-style:italic}
.dark .foot{color:#9CB2A4}
.intro{margin-bottom:24px;max-width:80ch}
.chiffrage-tag{display:inline-block;margin-top:10px;font-size:.82rem;font-weight:600;color:var(--teal);background:var(--teal-pale);border-radius:6px;padding:3px 10px}
/* card_solo — 1 solution par slide */
.solo-card{max-width:700px}
.section-sub{color:var(--gold);font-family:'DM Mono',monospace;font-size:.82rem;letter-spacing:.14em;text-transform:uppercase;margin-bottom:24px}
.solo-texte{font-size:1.12rem;line-height:1.68;margin:22px 0;max-width:65ch;color:var(--ink-soft)}
.solo-chiffrage{display:inline-flex;align-items:center;gap:16px;margin-top:30px;background:var(--teal-pale);border-radius:14px;padding:16px 26px}
.solo-chiffrage .sc-label{font-size:.78rem;color:var(--teal);font-family:'DM Mono',monospace;letter-spacing:.1em;text-transform:uppercase}
.solo-chiffrage .sc-val{font-family:'Fraunces',serif;font-size:1.8rem;color:var(--teal);font-weight:600}
/* section — slide séparateur de chapitre */
.sec-items{display:flex;flex-direction:column;gap:14px;margin-top:10px}
.sec-item{display:flex;align-items:center;gap:22px;padding:18px 26px;background:rgba(255,255,255,.09);border-radius:14px;font-size:1.1rem;color:var(--ivory)}
.sec-n{flex:none;width:44px;height:44px;border-radius:50%;background:var(--gold);color:var(--forest);display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-weight:600;font-size:1.25rem}
/* Loading */
#loading{position:fixed;inset:0;background:var(--forest);display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--ivory)}
#loading .spinner{width:40px;height:40px;border:3px solid rgba(196,151,58,.3);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite;margin-bottom:24px}
@keyframes spin{to{transform:rotate(360deg)}}
#loading p{color:var(--gold-light);font-family:'DM Mono',monospace;font-size:.9rem;letter-spacing:.1em}
#error{position:fixed;inset:0;background:var(--forest);display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--ivory);text-align:center;padding:40px}
#error h2{color:var(--gold-light);font-family:'Fraunces',serif;font-size:2rem;margin-bottom:16px}
#error p{color:#CFE0D5;font-size:1.1rem;max-width:500px}
.nav{position:fixed;bottom:20px;right:26px;display:flex;align-items:center;gap:14px;z-index:50;background:rgba(19,45,30,.82);backdrop-filter:blur(6px);padding:8px 14px;border-radius:30px}
.nav button{background:none;border:none;color:var(--gold-light);font-size:1.2rem;cursor:pointer;padding:4px 6px}
.nav button:hover{color:#fff}
.nav .count{font-family:'DM Mono',monospace;color:var(--ivory);font-size:.82rem;min-width:42px;text-align:center}
.hint{position:fixed;bottom:24px;left:26px;z-index:50;font-family:'DM Mono',monospace;font-size:.72rem;color:rgba(250,250,247,.4)}
@media print{body{overflow:visible;background:#fff}.slide{position:relative;opacity:1!important;visibility:visible!important;height:100vh;page-break-after:always}.nav,.hint,#loading,#error{display:none}}
@media(max-width:760px){.kpis{grid-template-columns:repeat(2,1fr)!important}.row{flex-direction:column}}
</style>
</head>
<body>

<div id="loading"><div class="spinner"></div><p>Chargement de la présentation…</p></div>
<div id="error" style="display:none">
  <h2>Présentation introuvable</h2>
  <p id="error-msg">Retournez sur la fiche client et utilisez le bouton "Présentation".</p>
</div>
<div class="deck" id="deck" style="display:none"></div>
<div class="hint">← → ou Espace · F plein écran · Ctrl+P pour PDF</div>
<div class="nav" style="display:none" id="nav">
  <button id="prev">‹</button>
  <span class="count" id="count"></span>
  <button id="next">›</button>
</div>

<script>
/* =====================================================================
   CATALOGUE DE BLOCS-SOLUTIONS (enrichi au fil des clients)
   ===================================================================== */
const CATALOG = {
  /* — RETRAITE — */
  per_retraite:{
    titre:"PER — réactiver le plafond",
    texte:"Versements déductibles du revenu imposable à la TMI du foyer. Sortie en capital ou en rente à la retraite. Double effet : retraite + réduction d'impôt immédiate."
  },
  per_retraite_couple:{
    titre:"PER — compléter le plafond couple",
    texte:"Chacun dispose d'un plafond épargne retraite propre. Des versements volontaires sur PER individuel restent déductibles à 30 % — fenêtre à saisir avant les départs."
  },
  loyers_liberes_dumaire:{
    titre:"Crédit RS libéré — nov. 2026",
    texte:"La fin du crédit de Villeneuve-sur-Yonne (650 €/mois) libère un flux régulier dès ce trimestre. Ce surplus peut abonder le PER ou alimenter une assurance-vie directement."
  },
  perco_pilotage:{
    titre:"Piloter la sortie du PERCO",
    texte:"Les PERCO totalisent 139 000 €. Sortie en capital ou en rente à la retraite — le mode de sortie conditionne fortement la fiscalité, surtout si loyers, pension et PERCO se cumulent la même année."
  },
  /* — IMMOBILIER / STRUCTURE — */
  obo:{
    titre:"OBO — Owner Buy Out",
    texte:"Vendre ses biens à une SCI que vous créez, financée par un crédit. La SCI rachète, le crédit est remboursé par les loyers, et vous disposez d'un capital net d'impôt immédiat (abattement sur la plus-value)."
  },
  sci:{
    titre:"SCI à l'IS — amortir, optimiser",
    texte:"En passant à l'IS, la SCI amortit les biens (réduction fiscale) et ouvre la possibilité de reverser des dividendes à terme. Compatible avec une structuration OBO."
  },
  deficit_foncier:{
    titre:"Déficit foncier — travaux déductibles",
    texte:"Les travaux réalisés sur les biens locatifs créent un déficit foncier déductible des revenus globaux (dans la limite de 10 750 €/an). Un levier puissant à la TMI 30 % ou plus."
  },
  scpi:{
    titre:"SCPI — diversification pilotée",
    texte:"Immobilier mutualisé et géré : pas de gestion locative, mutualisation du risque locatif, ticket d'entrée faible. Complément idéal pour diversifier sans alourdir la gestion.",
    libre:true
  },
  /* — TRANSMISSION — */
  demembrement:{
    titre:"Donation en démembrement",
    texte:"Donner la nue-propriété aux enfants (valeur fiscale réduite selon l'âge des donateurs) tout en conservant l'usufruit. Transmission à moindre coût fiscal, sans perdre la jouissance du bien."
  },
  assurance_vie_transmission:{
    titre:"Assurance-vie : l'abattement des 152 500 €",
    texte:"Chaque bénéficiaire est exonéré à hauteur de 152 500 € (primes versées avant 70 ans). Avec 2 contrats et 2 enfants bénéficiaires, l'enveloppe exonérée peut atteindre 610 000 € en capital décès.",
    highlight:{big:"610 000 €",sub:"de capital transmissible exonéré de droits via les contrats d'assurance-vie, en désignant les enfants bénéficiaires (plafond primes avant 70 ans)."}
  },
  assurance_vie:{
    titre:"Assurance-vie",
    texte:"Alimentée par le surplus de trésorerie : capital disponible, peu fiscalisé après 8 ans, et levier de transmission (abattement 152 500 €/bénéficiaire avant 70 ans)."
  },
  /* — FISCALITE — */
  per_couple_chiffrage:{
    titre:"PER couple — estimation d'économie",
    table:{
      head:["Estimation versements (ex. 2026)","Montant"],
      rows:[
        ["Plafond Anne-Marie — reliquat estimé","~5 500 €"],
        ["Plafond Frédéric — reliquat estimé","~3 000 €"],
        ["Total versements déductibles envisageables","~8 500 €",true],
        ["Économie d'impôt (TMI 30 %)","~2 550 €",true],
        ["Capital retraite supplémentaire","~8 500 € + intérêts"]
      ],
      note:"Reliquat exact sur l'avis d'imposition (pages 4-5). PERCO et PERP déjà alimentés viennent en déduction du plafond."
    },
    effects:[
      {titre:"Déductibilité immédiate", texte:"Les versements PER réduisent le revenu imposable de l'année de versement."},
      {titre:"Urgence avant retraite", texte:"Alimenter le PER cette année encore pour profiter de la TMI 30 % avant le départ."},
      {titre:"Sortie en capital", texte:"Plus souple qu'une rente quand les revenus locatifs couvrent déjà le budget."}
    ]
  },
  per_fiscal:{
    titre:"PER — impact fiscal immédiat",
    table:{
      head:["Scenario","Montant"],
      rows:[
        ["Plafond estimé disponible","À calculer"],
        ["Économie d'impôt (TMI 30 %)","30 % du versement",true],
        ["Capital constitué","Versement + intérêts"]
      ],
      note:"Reliquat exact à lire sur l'avis d'imposition N-1."
    },
    effects:[
      {titre:"Déduction immédiate", texte:"Versements déductibles du revenu global de l'année."},
      {titre:"Sortie flexible", texte:"Capital ou rente à la retraite — au choix."},
      {titre:"Transmissible", texte:"Capital décès au conjoint ou bénéficiaires désignés."}
    ]
  },
  assurance_vie_transmission_split:{
    titre:"AV — abattement 152 500 €",
    table:{
      head:["Scénario","Montant"],
      rows:[
        ["Abattement par bénéficiaire (primes avant 70 ans)","152 500 €"],
        ["Avec 2 enfants bénéficiaires × 2 contrats","610 000 €",true],
        ["Fiscalité au-delà","20 % jusqu'à 700 k€ puis 31,25 %"]
      ],
      note:"Les primes versées après 70 ans ne bénéficient pas de cet abattement (abattement global de 30 500 € pour l'ensemble des bénéficiaires)."
    },
    effects:[
      {titre:"Hors succession", texte:"L'assurance-vie n'entre pas dans l'actif successoral — pas de droits de succession classiques."},
      {titre:"Clause bénéficiaire", texte:"La rédaction de la clause conditionne l'efficacité totale du dispositif."},
      {titre:"Cumul possible", texte:"Chaque souscripteur a ses propres plafonds — couple = double enveloppe."}
    ]
  },
  /* — EPARGNE — */
  pea:{
    titre:"PEA",
    texte:"Enveloppe actions : exonération d'impôt sur les gains après 5 ans. Complément de diversification pour préparer la retraite ou financer un projet à moyen terme."
  }
};

/* =====================================================================
   RENDERERS
   ===================================================================== */
const fmt = n => new Intl.NumberFormat('fr-FR').format(Math.round(n));
const esc = s => (s == null ? "" : String(s));
const liList = arr => "<ul>" + arr.map(t => `<li>${esc(t)}</li>`).join("") + "</ul>";

const R = {
  cover(s, d) {
    const meta = [];
    meta.push(`<div><span>Client(s)</span><strong>${esc(d.client.nom)}</strong></div>`);
    if (d.client.situation) meta.push(`<div><span>Situation</span><strong>${esc(d.client.situation)}</strong></div>`);
    if (d.client.retraite) meta.push(`<div><span>Retraite visée</span><strong>${esc(d.client.retraite)}</strong></div>`);
    meta.push(`<div><span>Date</span><strong>${esc(d.client.date)}</strong></div>`);
    return `<section class="slide dark cover">
      <div class="brand">${esc(d.cabinet)} · Gestion de patrimoine</div>
      <h1>Bilan patrimonial <em>&amp; propositions</em></h1>
      <div class="sub">Synthèse de votre situation et axes de travail — Rendez-vous n°2</div>
      <div class="metarow">${meta.join("")}</div></section>`;
  },

  situation(s, d) {
    const kpis = (d.revenus || []).map(r =>
      `<div class="kpi ${r.hl ? 'hl' : ''}"><div class="v">${esc(r.v)}</div><div class="k">${esc(r.k)}</div></div>`
    ).join("");
    return `<section class="slide"><div class="label">${esc(s.label)}</div><h2>${esc(s.titre)}</h2>
    <div class="row">
      <div class="col card"><div class="ctitle">Profil</div>${liList(d.profil || [])}</div>
      <div class="col">
        <div class="kpis" style="grid-template-columns:repeat(2,1fr);margin-bottom:0">${kpis}</div>
        ${d.revenus_note ? `<p class="muted small" style="margin-top:14px">${esc(d.revenus_note)}</p>` : ""}
      </div>
    </div></section>`;
  },

  objectifs(s, d) {
    const items = (d.objectifs || []).map((o, k) =>
      `<div class="obj"><div class="n">${k + 1}</div><div><h3>${esc(o.titre)}</h3><p>${esc(o.desc)}</p></div></div>`
    ).join("");
    return `<section class="slide"><div class="label">${esc(s.label)}</div><h2>${esc(s.titre)}</h2>${items}</section>`;
  },

  patrimoine(s, d) {
    const p = d.patrimoine || {};
    const biens = p.biens || [];
    const brut = biens.reduce((a, b) => a + (b.valeur || 0), 0);
    const loy = biens.reduce((a, b) => a + (b.loyers || 0), 0);
    const crd = p.crd || 0;
    const net = brut - crd;
    const rdt = brut ? (loy / brut * 100) : 0;
    const hasEstimees = biens.some(b => b.valeur_estimee || b.valeur === 0);
    const rows = biens.map(b => {
      const v = (b.valeur === null || b.valeur_estimee) ? '<span style="color:var(--slate);font-style:italic">N/C</span>'
        : (b.valeur > 0 ? fmt(b.valeur / 1000) + ' k€' : '—');
      return `<tr><td>${esc(b.label)}</td><td class="num">${v}</td></tr>`;
    }).join("");
    const tableLabel = p.biens_label || (biens.length + " biens immobiliers");
    const alerte = p.alerte || (hasEstimees ? {
      titre: "⚠ Valeurs à confirmer",
      texte: "Certains biens n'ont pas de valeur actualisée. Un avis de valeur est recommandé avant présentation au client."
    } : null);
    return `<section class="slide"><div class="label">${esc(s.label)}</div><h2>${esc(s.titre)}</h2>
    <div class="kpis" style="grid-template-columns:repeat(4,1fr)">
      <div class="kpi"><div class="v">~${fmt(brut / 1000)} k€</div><div class="k">Valeur brute estimée</div></div>
      <div class="kpi"><div class="v">~${fmt(crd / 1000)} k€</div><div class="k">Dette résiduelle (CRD)</div></div>
      <div class="kpi hl"><div class="v">~${fmt(net / 1000)} k€</div><div class="k">Patrimoine net immo</div></div>
      <div class="kpi"><div class="v">~${rdt.toFixed(1).replace('.', ',')} %</div><div class="k">Rendement locatif brut</div></div>
    </div>
    <div class="row">
      <div class="col"><table><thead><tr><th>${tableLabel}</th><th class="num">Valeur est.</th></tr></thead><tbody>${rows}</tbody></table></div>
      ${alerte ? `<div class="col alert"><h3>${esc(alerte.titre)}</h3><p>${esc(alerte.texte)}</p></div>` : ''}
    </div></section>`;
  },

  diagnostic(s, d) {
    const dg = d.diagnostic || {};
    return `<section class="slide"><div class="label">${esc(s.label)}</div><h2>${esc(s.titre)}</h2>
    <div class="row" style="margin-bottom:22px">
      <div class="col card"><div class="ctitle">Forces</div>${liList(dg.forces || [])}</div>
      <div class="col card gold"><div class="ctitle">Points de vigilance</div>${liList(dg.vigilance || [])}</div>
    </div>
    ${dg.band ? `<div class="band"><h3>${esc(dg.band.titre)}</h3><p>${esc(dg.band.texte)}</p></div>` : ""}</section>`;
  },

  cards(s, d) {
    const cards = (s.cards || []).map((card, k) => {
      // Supporte les deux formats : string "per_retraite" ou objet {id:"per_retraite", chiffrage:"..."}
      const cardId = (typeof card === 'object' && card !== null) ? card.id : card;
      const cardChiffrage = (typeof card === 'object' && card !== null) ? (card.chiffrage || null) : null;
      const b = CATALOG[cardId]; if (!b) return "";
      let inner = `${s.numbered ? `<div class="n">${k + 1}</div>` : ""}<h3>${esc(b.titre)}</h3>`;
      if (b.texte) inner += `<p>${esc(b.texte)}</p>`;
      if (b.list) inner += liList(b.list);
      if (b.highlight) inner += `<div class="stat-box"><div class="big">${esc(b.highlight.big)}</div><p>${esc(b.highlight.sub)}</p></div>`;
      if (cardChiffrage) inner += `<span class="chiffrage-tag">${esc(cardChiffrage)}</span>`;
      return `<div class="col card ${s.numbered ? 'lev' : ''}">${inner}</div>`;
    }).join("");
    return `<section class="slide"><div class="label gold">${esc(s.label)}</div><h2>${esc(s.titre)}</h2>
    ${s.intro ? `<p class="intro">${esc(s.intro)}</p>` : ""}<div class="row">${cards}</div></section>`;
  },

  split(s, d) {
    const b = CATALOG[s.solution]; if (!b) return "";
    const t = b.table || {};
    const rows = (t.rows || []).map(r =>
      `<tr class="${r[2] ? 'hl' : ''}"><td>${esc(r[0])}</td><td class="num">${esc(r[1])}</td></tr>`
    ).join("");
    const effs = (b.effects || []).map(e =>
      `<div class="eff"><h3>${esc(e.titre)}</h3><p>${esc(e.texte)}</p></div>`
    ).join("");
    return `<section class="slide"><div class="label gold">${esc(s.label)}</div><h2>${esc(s.titre)}</h2>
    ${s.intro ? `<p class="intro">${esc(s.intro)}</p>` : ""}
    <div class="row">
      <div class="col" style="flex:1.15">
        <table><thead><tr><th>${esc(t.head?.[0] || '')}</th><th class="num">${esc(t.head?.[1] || '')}</th></tr></thead><tbody>${rows}</tbody></table>
        ${t.note ? `<p class="muted small" style="margin-top:14px">${esc(t.note)}</p>` : ""}
      </div>
      <div class="col">${effs}</div>
    </div></section>`;
  },

  section(s, d) {
    const items = (s.items || []).map((item, k) =>
      `<div class="sec-item"><div class="sec-n">${k + 1}</div><span>${esc(item)}</span></div>`
    ).join("");
    return `<section class="slide dark"><div class="label">${esc(s.label)}</div><h2>${esc(s.titre)}</h2>
    ${s.sub ? `<p style="color:#CFE0D5;margin-bottom:36px;font-size:1.1rem">${esc(s.sub)}</p>` : ""}
    <div class="sec-items">${items}</div></section>`;
  },

  card_solo(s, d) {
    const cardData = s.card;
    const cardId = (typeof cardData === 'object' && cardData !== null) ? cardData.id : cardData;
    const cardChiffrage = (typeof cardData === 'object' && cardData !== null) ? (cardData.chiffrage || null) : null;
    const b = CATALOG[cardId]; if (!b) return "";
    return `<section class="slide"><div class="label gold">${esc(s.label)}</div>
    ${s.section_titre ? `<p class="section-sub">${esc(s.section_titre)}</p>` : ""}
    <div class="solo-card">
      <h2>${esc(b.titre)}</h2>
      ${b.texte ? `<p class="solo-texte">${esc(b.texte)}</p>` : ""}
      ${b.list ? liList(b.list) : ""}
      ${b.highlight ? `<div class="stat-box"><div class="big">${esc(b.highlight.big)}</div><p>${esc(b.highlight.sub)}</p></div>` : ""}
      ${cardChiffrage ? `<div class="solo-chiffrage"><span class="sc-label">Versement mensuel envisagé</span><span class="sc-val">${esc(cardChiffrage)} €</span></div>` : ""}
    </div></section>`;
  },

  roadmap(s, d) {
    const steps = (d.feuille_route || []).map(st =>
      `<div class="step"><div class="when">${esc(st.when)}</div><p>${esc(st.texte)}</p></div>`
    ).join("");
    const pcs = liList(d.pieces || []);
    return `<section class="slide dark"><div class="label">${esc(s.label)}</div><h2>${esc(s.titre)}</h2>
    <div class="row">
      <div class="col steps" style="flex:1.4">${steps}</div>
      <div class="col piecebox"><div class="ctitle">Pièces à fournir</div>${pcs}</div>
    </div>
    <div class="foot">${esc(d.cabinet)} · ${esc(d.lieu)} — Document de travail, ${esc(d.client.date)}.</div></section>`;
  }
};

/* =====================================================================
   MAP SUPABASE → DOSSIER
   ===================================================================== */
const SLOT_LABELS = { rp:'Résidence principale', rs:'Résidence secondaire', loc1:'Locatif', loc2:'Locatif 2' };

function buildNom(c) {
  let nom = [c.prenom_c1, c.nom_c1].filter(Boolean).join(' ');
  if (c.prenom_c2 && c.nom_c2) nom += ` & ${c.prenom_c2} ${c.nom_c2}`;
  return nom || '—';
}

function buildSituationStr(c) {
  const parts = [];
  if (c.statut_marital) parts.push(c.statut_marital);
  if (c.regime) parts.push(c.regime);
  if (c.enfants_noms) {
    const nb = c.enfants_noms.split(',').filter(s => s.trim()).length;
    if (nb > 0) parts.push(nb + ' enfant' + (nb > 1 ? 's' : ''));
  }
  return parts.join(' · ') || '—';
}

function mapBiens(immo) {
  const biens = [];
  if (!immo) return biens;
  const active = immo.active || [];

  for (const key of active) {
    if (key === 'locataire') continue;
    const b = immo[key];
    if (!b || (!b.valeur && !b.adresse && !b.achat)) continue;
    const base = SLOT_LABELS[key] || 'Locatif';
    const suffix = b.adresse ? ` — ${b.adresse}` : '';
    const year = b.date_achat ? ` (${String(b.date_achat).slice(0, 4)})` : '';
    biens.push({
      label: base + suffix + year,
      valeur: b.valeur || 0,
      loyers: b.loyers || 0,
      valeur_estimee: b.valeur === null
    });
  }

  for (const b of (immo.extras || [])) {
    if (!b) continue;
    const base = b.label || (b.type ? b.type : 'Bien immobilier');
    const suffix = (!b.label && b.adresse) ? ` — ${b.adresse}` : '';
    const year = (!b.label && b.date_achat) ? ` (${String(b.date_achat).slice(0, 4)})` : '';
    biens.push({
      label: base + suffix + year,
      valeur: b.valeur || 0,
      loyers: b.loyers || 0,
      valeur_estimee: b.valeur === null
    });
  }
  return biens;
}

function mapCRD(credits) {
  if (!credits) return 0;
  let crd = 0;
  const active = credits.active || [];
  for (const key of active) {
    const c = credits[key];
    if (c && c.restant) crd += Number(c.restant) || 0;
  }
  return crd;
}

function mapRevenus(c) {
  const rev = [];
  const s1 = Number(c.salaire_c1) || 0;
  const s2 = Number(c.salaire_c2) || 0;
  if (s1 > 0) {
    const lbl = c.nom_c2 ? `Revenu ${c.prenom_c1 || 'C1'} / an` : 'Revenu annuel';
    rev.push({ v: fmt(s1) + ' €', k: lbl });
  }
  if (s2 > 0) rev.push({ v: fmt(s2) + ' €', k: `Revenu ${c.prenom_c2 || 'C2'} / an` });
  const biens = mapBiens(c.immobilier || {});
  const loyers = biens.reduce((a, b) => a + (b.loyers || 0), 0);
  if (loyers > 0) rev.push({ v: fmt(loyers) + ' €', k: 'Loyers bruts / an' });
  if (c.tmi) rev.push({ v: c.tmi + ' %', k: 'Tranche marginale (TMI)', hl: true });
  return rev;
}

function mapToDossier(c, bil) {
  const raw = bil?.preconisations;
  const preco = (raw && !Array.isArray(raw) && typeof raw === 'object') ? raw : {};

  const biens = mapBiens(c.immobilier || {});
  const crd = mapCRD(c.credits || {});
  const revenus = mapRevenus(c);

  const deck = [
    { layout: 'cover' },
    { layout: 'situation', label: '01 — Votre situation', titre: 'Qui vous êtes aujourd\'hui' }
  ];
  deck.push({ layout: 'patrimoine', label: '03 — Patrimoine immobilier', titre: 'Votre patrimoine immobilier' });
  if (preco.diagnostic) {
    deck.push({ layout: 'diagnostic', label: '04 — Diagnostic', titre: 'Notre lecture de votre situation' });
  }
  // Auto-cards : preco.deck_extra — objectifs inséré juste après le 1er slide section
  let _objInserted = false;
  for (const slide of (preco.deck_extra || [])) {
    deck.push(slide);
    if (!_objInserted && slide.layout === 'section' && preco.objectifs?.length) {
      deck.push({ layout: 'objectifs', label: '02 — Vos objectifs', titre: 'Ce que vous nous avez confié' });
      _objInserted = true;
    }
  }
  // Fallback : pas de section dans deck_extra
  if (!_objInserted && preco.objectifs?.length) {
    deck.push({ layout: 'objectifs', label: '02 — Vos objectifs', titre: 'Ce que vous nous avez confié' });
  }
  if (preco.feuille_route?.length) {
    deck.push({ layout: 'roadmap', label: '05 — Prochaines étapes', titre: 'Notre feuille de route' });
  }

  return {
    cabinet: 'Proactifs Conseils',
    lieu: 'Colombes (92)',
    client: {
      nom: buildNom(c),
      situation: buildSituationStr(c),
      retraite: '',
      date: preco.presentation_date || new Date().toLocaleDateString('fr-FR', { month: 'long', year: 'numeric' })
    },
    profil: preco.profil || [
      c.statut_marital && c.regime ? `${c.statut_marital} — régime ${c.regime}` : c.statut_marital,
      (c.prenom_c1 && c.statut_pro_c1) ? `${c.prenom_c1} : ${c.statut_pro_c1}` : null,
      (c.prenom_c2 && c.statut_pro_c2) ? `${c.prenom_c2} : ${c.statut_pro_c2}` : null,
      c.tmi ? `TMI ${c.tmi} %` : null,
      c.enfants_noms ? `Enfants : ${c.enfants_noms}` : null
    ].filter(Boolean),
    revenus,
    revenus_note: c.rfr ? `RFR déclaré : ${fmt(Number(c.rfr))} €` : '',
    patrimoine: {
      biens,
      crd,
      biens_label: preco.biens_label || null,
      alerte: preco.patrimoine_alerte || null
    },
    objectifs: preco.objectifs || [],
    diagnostic: preco.diagnostic || null,
    feuille_route: preco.feuille_route || [],
    pieces: preco.pieces || [],
    deck
  };
}

/* =====================================================================
   MOTEUR DE RENDU & NAVIGATION
   ===================================================================== */
function build(d) {
  document.getElementById('deck').innerHTML = d.deck.map(s => {
    if (!R[s.layout]) return '';
    return R[s.layout](s, d);
  }).join('');
}

let slides = [], idx = 0;
function show(n) {
  idx = Math.max(0, Math.min(slides.length - 1, n));
  slides.forEach((s, k) => s.classList.toggle('active', k === idx));
  document.getElementById('count').textContent = (idx + 1) + ' / ' + slides.length;
}

function startDeck() {
  slides = [...document.querySelectorAll('.slide')];
  idx = 0;
  document.getElementById('loading').style.display = 'none';
  document.getElementById('deck').style.display = '';
  document.getElementById('nav').style.display = '';
  document.getElementById('next').onclick = () => show(idx + 1);
  document.getElementById('prev').onclick = () => show(idx - 1);
  document.addEventListener('keydown', e => {
    if (['ArrowRight', ' ', 'PageDown'].includes(e.key)) { e.preventDefault(); show(idx + 1); }
    else if (['ArrowLeft', 'PageUp'].includes(e.key)) { e.preventDefault(); show(idx - 1); }
    else if (e.key === 'Home') show(0);
    else if (e.key === 'End') show(slides.length - 1);
    else if (e.key.toLowerCase() === 'f') {
      document.fullscreenElement ? document.exitFullscreen() : document.documentElement.requestFullscreen();
    }
  });
  show(0);
}

function showError(msg) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('error').style.display = 'flex';
  document.getElementById('error-msg').textContent = msg;
}

function render(client, bilan) {
  try {
    const dossier = mapToDossier(client, bilan);
    build(dossier);
    startDeck();
  } catch (err) {
    showError('Erreur lors de la génération : ' + err.message);
    console.error(err);
  }
}

/* =====================================================================
   INITIALISATION — lit depuis localStorage (passé par le CRM)
   ===================================================================== */
(function init() {
  const params = new URLSearchParams(location.search);
  const clientId = params.get('client');

  if (!clientId) {
    showError('Aucun client spécifié — utilisez le bouton "Présentation" depuis la fiche client du CRM.');
    return;
  }

  const cached = localStorage.getItem('pres_' + clientId);
  if (!cached) {
    showError('Données non trouvées pour ce client. Retournez sur la fiche client et cliquez à nouveau sur "Présentation".');
    return;
  }

  try {
    const { client, bilan } = JSON.parse(cached);
    document.title = `Présentation — ${client.prenom_c1 || ''} ${client.nom_c1 || ''} | Proactifs Conseils`;
    render(client, bilan);
  } catch (e) {
    showError('Données corrompues — relancez depuis le CRM.');
  }
})();
</script>
