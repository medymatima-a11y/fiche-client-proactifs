name: Deploy to Vercel

on:
  push:
    branches: [ master ]
    paths:
      - 'deploy/index.html'
      - 'deploy-crm/index.html'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: node deploy-vercel.js
